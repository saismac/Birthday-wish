<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* MESSAGE */
h1 {
  position: absolute;
  width: 100%;
  top: 35%;
  text-align: center;
  color: white;
  font-size: 2.5em;
  z-index: 10; /* VERY IMPORTANT */
}

/* BALLOONS */
.balloon {
  width: 40px;
  height: 60px;
  border-radius: 50%;
  position: absolute;
  bottom: -100px;
  animation: float 7s linear infinite;
  z-index: 5;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

/* CAKE */
.cake {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 80px;
  z-index: 10;
}

/* FIREWORKS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1; /* BEHIND EVERYTHING */
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday to you my best friend Divya Reddy 🎂</h1>

<div class="cake">🎂</div>

<!-- BALLOONS -->
<div class="balloon" style="left:10%; background:red;"></div>
<div class="balloon" style="left:25%; background:blue;"></div>
<div class="balloon" style="left:40%; background:green;"></div>
<div class="balloon" style="left:60%; background:yellow;"></div>
<div class="balloon" style="left:75%; background:pink;"></div>

<canvas id="fireworks"></canvas>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: x,
      y: y,
      radius: 2,
      color: "hsl(" + Math.random()*360 + ",100%,50%)",
      speedX: (Math.random() - 0.5) * 6,
      speedY: (Math.random() - 0.5) * 6,
      life: 100
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    p.x += p.speedX;
    p.y += p.speedY;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    if (p.life <= 0) {
      particles.splice(i, 1);
      i--;
    }
  }

  requestAnimationFrame(animate);
}

setInterval(createFirework, 700);
animate();
</script>

</body>
</html>
