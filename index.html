<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(to top, #000000, #1a1a1a);
  font-family: Arial, sans-serif;
}

/* MESSAGE */
h1 {
  position: absolute;
  width: 100%;
  top: 20%;
  text-align: center;
  color: white;
  font-size: 2.8em;
  z-index: 3;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ff00ff, 0 0 40px #00ffff; }
}

/* BALLOONS */
.balloon {
  width: 50px;
  height: 70px;
  border-radius: 50%;
  position: absolute;
  bottom: -100px;
  animation: float 8s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

/* CAKE */
.cake {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 100px;
  z-index: 3;
}

/* FIREWORKS */
canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday to you my best friend Divya Reddy 🎂</h1>

<!-- CAKE -->
<div class="cake">🎂</div>

<!-- BALLOONS -->
<div class="balloon" style="left:10%; background:#ff4d4d;"></div>
<div class="balloon" style="left:25%; background:#4da6ff;"></div>
<div class="balloon" style="left:40%; background:#66ff66;"></div>
<div class="balloon" style="left:60%; background:#ffcc00;"></div>
<div class="balloon" style="left:75%; background:#ff66cc;"></div>
<div class="balloon" style="left:90%; background:#ff9933;"></div>

<canvas id="fireworks"></canvas>

<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 70; i++) {
    particles.push({
      x: x,
      y: y,
      radius: 2,
      color: `hsl(${Math.random()*360},100%,50%)`,
      speedX: (Math.random() - 0.5) * 7,
      speedY: (Math.random() - 0.5) * 7,
      life: 100
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, index) => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    if (p.life <= 0) {
      particles.splice(index, 1);
    }
  });

  requestAnimationFrame(animate);
}

setInterval(createFirework, 700);
animate();
</script>

</body>
</html>
